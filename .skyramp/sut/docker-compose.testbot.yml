services:
  gitea:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      INSTALL_LOCK: "true"
      SECRET_KEY: testbot-secret-key-gitea-ci
      DB_TYPE: sqlite3
      GITEA__log__LEVEL: warn
      GITEA__service__DISABLE_REGISTRATION: "false"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__ROOT_URL: http://localhost:3000/
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

volumes:
  gitea-data:
