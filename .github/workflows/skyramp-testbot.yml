name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' && github.actor != 'skyramp-testbot[bot]' }}

jobs:
  testbot:
    # Only run for pull_request events or issue_comment on PRs mentioning @skyramp-testbot
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@skyramp-testbot') && github.event.comment.user.login != 'skyramp-testbot[bot]')
    runs-on: 'ubuntu-latest'
    permissions:
      contents: write
      pull-requests: write
      checks: write

    steps:
      - name: Generate GitHub App Token
        id: skyramp-testbot-app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.SKYRAMP_TESTBOT_APP_ID }}
          private-key: ${{ secrets.SKYRAMP_TESTBOT_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          token: ${{ steps.skyramp-testbot-app-token.outputs.token }}

      - uses: skyramp/testbot@v0.10.8
        with:
          skyrampLicenseFile: ${{ secrets.SKYRAMP_LICENSE_FILE }}
          anthropicApiKey: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          githubToken: ${{ steps.skyramp-testbot-app-token.outputs.token }}
          skyrampMcpVersion: 0.3.0-rc.1
          skyrampExecutorVersion: v1.3.33
          sutSetupMode: 'none'
          enableDebug: true
          targetSetupCommand: 'docker system prune -f --filter "until=1h" && docker compose -f .skyramp/sut/docker-compose.testbot.yml --project-directory . up -d --build'
          targetReadyCheckCommand: 'curl -sf http://localhost:3000/api/v1/version'
          targetReadyCheckTimeout: '1800'
          targetReadyCheckDiagnosticsCommand: 'docker compose -f .skyramp/sut/docker-compose.testbot.yml --project-directory . ps && docker compose -f .skyramp/sut/docker-compose.testbot.yml --project-directory . logs --tail=80 gitea'
          targetTeardownCommand: 'docker compose -f .skyramp/sut/docker-compose.testbot.yml --project-directory . down -v && docker system prune -f --filter "until=1h"'
          authTokenCommand: 'bash .skyramp/sut/get-auth-token.sh'
          uiCredentials: 'testbot-admin:testbot1234'
